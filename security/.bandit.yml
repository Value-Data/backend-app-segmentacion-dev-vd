# Bandit - Python Static Security Analysis Configuration
# Proyecto: Sistema Segmentacion Nuevas Especies - Garces Fruit
# Ejecutar: bandit -c security/.bandit.yml -r backend/app/

# Directorios a excluir del analisis
exclude_dirs:
  - backend/tests
  - backend/app/__pycache__
  - .venv
  - venv
  - node_modules

# Tests a ejecutar (IDs de Bandit)
tests:
  # Autenticacion y Criptografia
  - B105  # hardcoded_password_string
  - B106  # hardcoded_password_funcarg
  - B107  # hardcoded_password_default
  - B108  # hardcoded_tmp_directory

  # SQL Injection
  - B608  # hardcoded_sql_expressions
  - B609  # wildcard_injection (Linux commands)

  # Importaciones peligrosas
  - B403  # import_pickle
  - B404  # import_subprocess
  - B405  # import_xml_etree
  - B406  # import_xml_sax
  - B407  # import_xml_expat
  - B408  # import_xml_minidom
  - B409  # import_xml_pulldom
  - B410  # import_lxml

  # Ejecucion de comandos
  - B601  # paramiko_calls
  - B602  # subprocess_popen_with_shell_equals_true
  - B603  # subprocess_without_shell_equals_true
  - B604  # any_other_function_with_shell_equals_true
  - B605  # start_process_with_a_shell
  - B606  # start_process_with_no_shell
  - B607  # start_process_with_partial_path

  # Criptografia
  - B301  # pickle_loads
  - B302  # marshal_loads
  - B303  # md5_sha1 (hash inseguro)
  - B304  # des_ciphers
  - B305  # cipher_modes

  # Networking
  - B501  # request_with_no_cert_validation
  - B502  # ssl_with_bad_version
  - B503  # ssl_with_bad_defaults
  - B504  # ssl_with_no_version
  - B505  # weak_cryptographic_key

  # General
  - B101  # assert_used (solo en produccion)
  - B110  # try_except_pass
  - B112  # try_except_continue
  - B201  # flask_debug_true (aplica a FastAPI debug mode)

# Nivel de severidad minimo para reportar
# Opciones: LOW, MEDIUM, HIGH
severity:
  - MEDIUM
  - HIGH

# Nivel de confianza minimo para reportar
# Opciones: LOW, MEDIUM, HIGH
confidence:
  - MEDIUM
  - HIGH

# Formato de salida
# Opciones: csv, custom, html, json, screen, txt, xml, yaml
output_format: screen

# Plugins especificos a ignorar (si generan falsos positivos)
skips: []

# Configuracion de plugins
any_other_function_with_shell_equals_true:
  no_shell:
    - os.execl
    - os.execle
    - os.execlp
    - os.execlpe
    - os.execv
    - os.execve
    - os.execvp
    - os.execvpe
    - os.spawnl
    - os.spawnle
    - os.spawnlp
    - os.spawnlpe
    - os.spawnv
    - os.spawnve
    - os.spawnvp
    - os.spawnvpe

hardcoded_password_string:
  word_list: "password,passwd,pwd,secret,token,key,api_key,apikey"
