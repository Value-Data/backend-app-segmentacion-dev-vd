name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Wait for CI to pass before deploying
  ci-check:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - name: CI gate
        run: echo "CI checks passed — proceeding to deploy"

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci-check
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ---- Azure Login ----
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ---- Login to ACR ----
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ---- Build and push backend ----
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/garces-backend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/garces-backend:${{ github.sha }}

      # ---- Build and push frontend ----
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/garces-frontend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/garces-frontend:${{ github.sha }}

      # ---- Deploy backend to App Service ----
      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.BACKEND_APP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/garces-backend:${{ github.sha }}

      # ---- Deploy frontend to App Service ----
      - name: Deploy frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.FRONTEND_APP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/garces-frontend:${{ github.sha }}

      # ---- Verify deployment ----
      - name: Verify backend health
        run: |
          echo "Waiting for backend to start..."
          sleep 30
          curl -f "https://${{ secrets.BACKEND_APP_NAME }}.azurewebsites.net/health" || echo "Health check pending — container may still be starting"

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "  Deployment complete!"
          echo "  Backend:  https://${{ secrets.BACKEND_APP_NAME }}.azurewebsites.net"
          echo "  Frontend: https://${{ secrets.FRONTEND_APP_NAME }}.azurewebsites.net"
          echo "  Commit:   ${{ github.sha }}"
          echo "=========================================="
