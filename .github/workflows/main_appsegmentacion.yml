name: Build and deploy Node.js app to Azure Web App - appsegmentacion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and build
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_56C29244B1BD42D6A877F28E75C587BE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_398BFC2B72DF4973AF85ACEF075E7BF4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7C4704BC01D34B0BB7B4AF4F90393FE2 }}

      - name: Configure App Service for static SPA
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='appsegmentacion'].resourceGroup" -o tsv)
          az webapp config appsettings set -n appsegmentacion -g "$RESOURCE_GROUP" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config set -n appsegmentacion -g "$RESOURCE_GROUP" \
            --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'appsegmentacion'
          slot-name: 'Production'
          package: frontend/dist
