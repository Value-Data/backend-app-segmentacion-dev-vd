# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - appsegmentacion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and build
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: https://backendsegmentacion-beb4hfaxcbd7d6h5.brazilsouth-01.azurewebsites.net/api/v1
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEF28239C5F141E5A311911FFE6CC607 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FBB54116A1DD46FBA744FF9DD24E93F8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_ED8097EE09C440B58A4DD687EB356B79 }}

      - name: Configure App Service for static SPA
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='appsegmentacion'].resourceGroup" -o tsv)
          az webapp config appsettings set -n appsegmentacion -g "$RESOURCE_GROUP" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config set -n appsegmentacion -g "$RESOURCE_GROUP" \
            --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'appsegmentacion'
          slot-name: 'Production'
          package: .
